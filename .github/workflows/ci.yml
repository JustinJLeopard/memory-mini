name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        extras: ["none", "embed"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.extras }}" = "embed" ]; then
            python -m pip install -e ".[dev,embed]"
          else
            python -m pip install -e ".[dev]"
          fi
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy
      - name: Pytest
        run: pytest --cov=memory_mini --cov-report=term-missing --cov-fail-under=95
